name: Publish Extension

on:
  push:
    tags:
      - 'v*' # Triggered when you push a tag like v6.0.0

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm ci

      - name: Package Extension
        run: npx @vscode/vsce package

      # Publish to VS Code Marketplace (official)
      - name: Publish to VS Code Marketplace
        run: npx @vscode/vsce publish
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      # Publish to Open VSX Registry (open-source marketplace)
      - name: Publish to Open VSX Registry
        run: npx ovsx publish *.vsix --pat ${{ secrets.OPEN_VSX_TOKEN }}

      # Create GitHub Release with the .vsix artifact
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.vsix"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
